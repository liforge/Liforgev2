<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LIFORGE v0.4</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="intro">
  <button class="enterBtn" onclick="enterSystem()">ENTER</button>
</div>

<div id="app">
  <div class="overlay"></div>

  <div class="container">
    <div class="inner">

      <div class="hero">
        <div class="heroPlaceholder">SVG PLACEHOLDER</div>
      </div>

      <div class="panel">

        <div class="statCard">
          <div class="statLabel">Sleep</div>
          <input id="sleep" type="number">
        </div>

        <div class="statCard">
          <div class="statLabel">Steps</div>
          <input id="steps" type="number">
        </div>

        <div class="statCard">
          <div class="statLabel">Training</div>
          <input id="training" type="number">
        </div>

        <div class="statCard">
          <div class="statLabel">Water</div>
          <input id="water" type="number">
        </div>

      </div>

      <div class="panel">
        <div class="statCard"><button onclick="save()">Save</button></div>
        <div class="statCard"><button onclick="showHistory()">History</button></div>
        <div class="statCard"><button onclick="clearHistory()">Clear</button></div>
      </div>

    </div>
  </div>
</div>

<div id="historyView" class="historyOverlay">
  <div class="historyCard">
    <button onclick="hideHistory()">Back</button>
    <div id="history"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
