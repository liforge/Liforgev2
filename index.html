<!DOCTYPE html>
<html>
<head>
  <title>LIFORGE</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f1115">
  <style>
*{box-sizing:border-box}
html,body{height:100%;margin:0;font-family:Arial;color:#e6e6e6;overflow-x:hidden}
body{min-height:100vh;background:url("liforge.png") center center/cover no-repeat fixed;position:relative}
body::before{content:"";position:fixed;inset:0;background:rgba(0,0,0,.20);z-index:0}
.app{position:relative;z-index:1;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:calc(20px + env(safe-area-inset-top)) 12px env(safe-area-inset-bottom)}
.container{width:100%;max-width:420px}
.brand{text-align:center;margin-bottom:10px}
.logo{width:90px;display:block;margin:0 auto 8px}
.brand p{margin:0;color:#b9c2d0;font-size:12px}
h1{text-align:center;margin:0}
.card{background:rgba(15,16,20,.18);backdrop-filter:blur(8px);padding:15px;margin-top:15px;border-radius:16px;border:1px solid rgba(255,255,255,.08);box-shadow:0 6px 20px rgba(0,0,0,.20)}
input{width:100%;padding:10px;margin:5px 0 10px;border-radius:8px;border:none;background:#2a2f3a;color:#fff}
button{width:100%;padding:10px;border:none;border-radius:10px;background:#4f7cff;color:#fff;font-weight:bold;cursor:pointer}
button:hover{background:#3b66ff}
.score{font-size:28px;text-align:center;font-weight:bold;margin-top:10px}
.history-item{margin-top:10px;padding:10px;background:rgba(255,255,255,.06);border-radius:10px}
#installBtn{position:fixed;top:12px;right:12px;padding:10px 12px;background:#4f7cff;color:#fff;border:none;border-radius:10px;cursor:pointer;z-index:999;display:none}
  </style>
</head>
<body>
<button id="installBtn">Zainstaluj</button>
<div class="app"><div class="container">
<div class="brand"><img src="logo-512.png" class="logo" alt="LIFORGE logo"><h1>LIFORGE</h1><p>Forge Yourself</p></div>
<div class="card"><label>Sleep (hours)</label><input id="sleep" type="number"><label>Steps</label><input id="steps" type="number"><button onclick="save()">Save</button></div>
<div class="card"><div>Today score</div><div class="score" id="score">--</div></div>
<div class="card"><div>History</div><div id="history"></div></div>
</div></div>
<script>
function getData(){return JSON.parse(localStorage.getItem("liforge"))||[];}
function saveData(d){localStorage.setItem("liforge",JSON.stringify(d));}
function save(){
const sleep=Number(document.getElementById("sleep").value);
const steps=Number(document.getElementById("steps").value);
const score=Math.round(((Math.min(sleep/7,1)+Math.min(steps/8000,1))/2)*100);
document.getElementById("score").innerText=score+"%";
let data=getData();
data.unshift({date:new Date().toISOString().split("T")[0],sleep,steps,score});
saveData(data);render();}
function render(){
const c=document.getElementById("history");
c.innerHTML="";
getData().slice(0,5).forEach(d=>{c.innerHTML+=`<div class="history-item"><b>${d.date}</b><br>${d.sleep}h sleep • ${d.steps} steps • ${d.score}%</div>`;});
}
render();
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js'));}
let deferredPrompt;const btn=document.getElementById("installBtn");
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredPrompt=e;btn.style.display="block";});
btn.addEventListener("click",async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();const choice=await deferredPrompt.userChoice;if(choice.outcome==="accepted")btn.style.display="none";deferredPrompt=null;});
</script>
</body>
</html>
