<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LIFORGE v0.3</title>

<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:Arial;background:#0f1115;color:#e6e6e6}

body{
background:url('liforge.png') center/cover fixed no-repeat;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
z-index:0;
}

.app{
position:relative;
z-index:1;
height:100%;
padding:40px 12px;
display:flex;
justify-content:center;
align-items:flex-start;
}

/* INTRO */
#intro{
position:fixed;
inset:0;
z-index:9999;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(8,10,18,.75);
backdrop-filter:blur(10px);
transition:.8s ease;
}

#intro.hide{
opacity:0;
pointer-events:none;
transform:scale(1.05);
}

#intro img{
width:120px;
margin-bottom:20px;
filter:drop-shadow(0 0 20px rgba(124,247,255,.4));
animation:pulse 3s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

.enterBtn{
padding:16px 34px;
border-radius:30px;
font-size:16px;
font-weight:bold;
cursor:pointer;
border:1px solid rgba(255,255,255,.2);
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
color:white;
transition:.2s;
}

.enterBtn:hover{
transform:scale(1.05);
background:rgba(255,255,255,.12);
}

/* CONTAINER */
.container{max-width:420px;width:100%}

/* HERO */
.hero{text-align:center}

.logo{
font-size:54px;
font-weight:bold;
letter-spacing:2px;
text-shadow:0 0 25px rgba(124,247,255,.65);
margin-bottom:6px;
animation:logoPulse 3.5s ease-in-out infinite;
}

@keyframes logoPulse{
0%{transform:scale(1)}
50%{transform:scale(1.04)}
100%{transform:scale(1)}
}

.sub{opacity:.6;font-size:12px;letter-spacing:2px;margin-bottom:10px}

.card{
margin-top:14px;
padding:15px;
border-radius:16px;
background:rgba(15,16,20,.18);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.08);
animation:fadeIn .6s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

input{
width:120px;
padding:10px;
border-radius:10px;
border:none;
margin-top:8px;
background:#2a2f3a;
color:#fff;
text-align:center;
font-size:16px;
}

button{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-top:8px;
cursor:pointer;
color:#fff;
font-weight:bold;
}

.glassBtn{
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.15);
font-weight:normal;
transition:.2s;
}

.glassBtn:hover{
transform:scale(1.02);
background:rgba(255,255,255,.12);
}

.score{
font-size:56px;
font-weight:bold;
text-shadow:0 0 20px rgba(124,247,255,.5);
}

/* HISTORY */
#historyView{display:none}

.historyItem{
padding:10px 0;
border-bottom:1px solid rgba(255,255,255,.08);
display:flex;
justify-content:space-between;
font-size:13px;
}

.arrow{margin-left:8px}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <img src="intro.png">
  <button class="enterBtn" onclick="enterSystem()">ENTER THE SYSTEM</button>
</div>

<!-- APP -->
<div class="app">
<div class="container">

<div id="mainView">

  <div class="hero">
    <div class="logo">LIFORGE</div>
    <div class="sub">Forge Yourself</div>
    <div id="score" class="score">--</div>
  </div>

  <div class="card">
    <div>Sleep</div>
    <input id="sleep" type="number">

    <div>Steps</div>
    <input id="steps" type="number">

    <button class="glassBtn" onclick="save()">Save</button>
  </div>

  <div class="card">
    <button class="glassBtn" onclick="showHistory()">History</button>
    <button class="glassBtn" onclick="clearHistory()">Clear History</button>
  </div>

  <div class="card">
    <div>Global Trend</div>
    <div id="trend">Stable</div>
  </div>

</div>

<!-- HISTORY -->
<div id="historyView" class="card">
  <button onclick="hideHistory()">← Back</button>
  <div id="history"></div>
</div>

</div>
</div>

<script>

function enterSystem(){
  document.getElementById("intro").classList.add("hide");
}

function getData(){
  return JSON.parse(localStorage.getItem("liforge")||"[]");
}

function saveData(d){
  localStorage.setItem("liforge",JSON.stringify(d));
}

function calcScore(sleep,steps){
  return Math.round(((Math.min(sleep/7,1)+Math.min(steps/8000,1))/2)*100);
}

function getArrow(score){
  if(score>=85) return "↑↑";
  if(score>=65) return "↑";
  if(score>=40) return "→";
  if(score>=20) return "↓";
  return "↓↓";
}

function save(){
  const sleep=Number(document.getElementById("sleep").value);
  const steps=Number(document.getElementById("steps").value);

  const score=calcScore(sleep,steps);

  document.getElementById("score").textContent=score+"%";

  const data=getData();
  data.unshift({
    date:new Date().toISOString().split("T")[0],
    sleep,
    steps,
    score
  });

  saveData(data);
  updateTrend();
}

function renderHistory(){
  const h=document.getElementById("history");
  h.innerHTML="";

  getData().slice(0,10).forEach(d=>{
    h.innerHTML+=`
      <div class="historyItem">
        <div>${d.date} • ${d.sleep}h • ${d.steps}</div>
        <div>${d.score}% <span class="arrow">${getArrow(d.score)}</span></div>
      </div>
    `;
  });
}

function showHistory(){
  renderHistory();
  document.getElementById("mainView").style.display="none";
  document.getElementById("historyView").style.display="block";
}

function hideHistory(){
  document.getElementById("historyView").style.display="none";
  document.getElementById("mainView").style.display="block";
}

function clearHistory(){
  if(confirm("Clear all history?")){
    localStorage.removeItem("liforge");
    document.getElementById("history").innerHTML="<div>History wiped.</div>";
  }
}

function updateTrend(){
  const data=getData();
  if(data.length<2) return;

  const latest=data[0].score;
  const prev=data[1].score;

  const diff=latest-prev;
  const trend=document.getElementById("trend");

  if(diff>5) trend.textContent="Rising ↑";
  else if(diff<-5) trend.textContent="Falling ↓";
  else trend.textContent="Stable →";
}

</script>

</body>
</html>
