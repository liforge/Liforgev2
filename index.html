<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>LIFORGE</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      justify-content: center;

      /* 🔥 tło (niebieski ogień) */
      background: url("https://images.unsplash.com/photo-1610878180933-123728745d8d?auto=format&fit=crop&w=1400&q=80");
      background-size: cover;
      background-position: center;
      min-height: 100vh;
    }

    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,20,0.75);
      z-index: 0;
    }

    .container {
      width: 420px;
      margin-top: 50px;
      position: relative;
      z-index: 1;
    }

    .card {
      background: rgba(20, 25, 40, 0.85);
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
      backdrop-filter: blur(6px);
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
      background: #2a2f3a;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #4f7cff;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 5px;
    }

    button.danger {
      background: #ff4f4f;
    }

    .score {
      font-size: 30px;
      text-align: center;
      font-weight: bold;
    }

    h1 {
      text-align: center;
    }
  </style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

  <h1>LIFORGE</h1>

  <div class="card">
    <label>Sen (godziny)</label>
    <input id="sleep" type="number">

    <label>Kroki</label>
    <input id="steps" type="number">

    <button onclick="zapiszDzien()">Zapisz dzień</button>
  </div>

  <div class="card">
    <div class="score" id="wynikDnia">--</div>
    <div style="text-align:center; opacity:0.7;">Dzisiejszy wynik</div>
  </div>

  <div class="card">
    <b>🔥 Streak:</b> <span id="streak">0</span> dni
  </div>

  <div class="card">
    <b>Historia</b>
    <div id="historia"></div>

    <button class="danger" onclick="wyczyscHistorie()">
      Wyczyść historię
    </button>
  </div>

</div>

<script>
function pobierz() {
  return JSON.parse(localStorage.getItem("liforge")) || [];
}

function zapisz(data) {
  localStorage.setItem("liforge", JSON.stringify(data));
}

function zapiszDzien() {
  const sen = Number(document.getElementById("sleep").value);
  const kroki = Number(document.getElementById("steps").value);

  const dzis = new Date().toISOString().split("T")[0];

  const wynik = Math.round(((Math.min(sen / 7, 1) + Math.min(kroki / 8000, 1)) / 2) * 100);

  let dane = pobierz();

  let streak = Number(localStorage.getItem("streak")) || 0;
  let ostatni = localStorage.getItem("ostatniaData");

  if (ostatni) {
    const roznica = (new Date(dzis) - new Date(ostatni)) / (1000*60*60*24);

    if (roznica === 1) streak++;
    else if (roznica > 1) streak = 1;
  } else {
    streak = 1;
  }

  localStorage.setItem("streak", streak);
  localStorage.setItem("ostatniaData", dzis);

  dane.unshift({ data: dzis, sen, kroki, wynik });

  zapisz(dane);

  document.getElementById("wynikDnia").innerText = wynik + "%";
  document.getElementById("streak").innerText = streak;

  render();
}

function render() {
  const dane = pobierz();
  const box = document.getElementById("historia");

  box.innerHTML = "";

  dane.slice(0, 7).forEach(d => {
    box.innerHTML += `
      <div style="margin-top:8px; padding:8px; background:#2a2f3a; border-radius:8px;">
        ${d.data} • ${d.wynik}%
      </div>
    `;
  });
}

function wyczyscHistorie() {
  localStorage.removeItem("liforge");
  localStorage.removeItem("streak");
  localStorage.removeItem("ostatniaData");

  document.getElementById("wynikDnia").innerText = "--";
  document.getElementById("streak").innerText = "0";
  document.getElementById("historia").innerHTML = "";
}

document.getElementById("streak").innerText = localStorage.getItem("streak") || 0;

render();
</script>

</body>
</html>
