<!DOCTYPE html>
<html>
<head>
  <title>LIFORGE</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f1115">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial;
      color: #e6e6e6;
      overflow-x: hidden;
    }

    /* BACKGROUND IMAGE */
    body {
      min-height: 100vh;
      background: url("liforge.png") center center / cover no-repeat fixed;
      position: relative;
    }

    /* DARK OVERLAY FOR READABILITY */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 0;
    }

    /* APP SHELL */
    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: calc(20px + env(safe-area-inset-top)) 12px env(safe-area-inset-bottom);
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    .brand {
      text-align: center;
      margin-bottom: 10px;
    }

    .logo {
      width: 90px;
      display: block;
      margin: 0 auto 8px;
    }

    .brand p {
      margin: 0;
      color: #b9c2d0;
      font-size: 12px;
    }

    h1 {
      text-align: center;
      margin: 0;
    }

    .card {
      background: rgba(26, 29, 36, 0.75);
      backdrop-filter: blur(8px);
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
      background: #2a2f3a;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #4f7cff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #3b66ff;
    }

    .score {
      font-size: 28px;
      text-align: center;
      font-weight: bold;
      margin-top: 10px;
    }

    img {
      width: 100%;
      height: auto;
      border-radius: 12px;
      margin-top: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    img:active {
      transform: scale(1.05);
    }

    .history-item {
      margin-top: 10px;
      padding: 10px;
      background: #2a2f3a;
      border-radius: 8px;
    }

    #installBtn {
      position: fixed;
      top: 12px;
      right: 12px;
      padding: 10px 12px;
      background: #4f7cff;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      z-index: 999;
      display: none;
    }
  </style>
</head>

<body>

<button id="installBtn">Zainstaluj</button>

<div class="app">
  <div class="container">

    <div class="brand">
      <img src="logo-512.png" class="logo" alt="LIFORGE logo">
      <h1>LIFORGE</h1>
      <p>Forge Yourself</p>
    </div>

    <div class="card">
      <label>Sleep (hours)</label>
      <input id="sleep" type="number">

      <label>Steps</label>
      <input id="steps" type="number">

      <button onclick="save()">Save</button>
    </div>

    <div class="card">
      <div>Today score</div>
      <div class="score" id="score">--</div>
    </div>

    <div class="card">
      <img src="liforge.png" onclick="zoom(this)" alt="LIFORGE image">
    </div>

    <div class="card">
      <div>History</div>
      <div id="history"></div>
    </div>

  </div>
</div>

<script>
function getData() {
  return JSON.parse(localStorage.getItem("liforge")) || [];
}

function saveData(data) {
  localStorage.setItem("liforge", JSON.stringify(data));
}

function save() {
  const sleep = Number(document.getElementById("sleep").value);
  const steps = Number(document.getElementById("steps").value);

  const score = Math.round(((Math.min(sleep / 7, 1) + Math.min(steps / 8000, 1)) / 2) * 100);

  document.getElementById("score").innerText = score + "%";

  const entry = {
    date: new Date().toISOString().split("T")[0],
    sleep,
    steps,
    score
  };

  let data = getData();
  data.unshift(entry);
  saveData(data);

  render();
}

function render() {
  const data = getData();
  const container = document.getElementById("history");

  container.innerHTML = "";

  data.slice(0, 5).forEach(d => {
    container.innerHTML += `
      <div class="history-item">
        <b>${d.date}</b><br>
        ${d.sleep}h sleep • ${d.steps} steps • ${d.score}%
      </div>
    `;
  });
}

function zoom(img) {
  img.style.transform =
    img.style.transform === "scale(1.5)" ? "scale(1)" : "scale(1.5)";
}

render();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js');
  });
}
</script>

<script>
let deferredPrompt;
const btn = document.getElementById("installBtn");

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  btn.style.display = "block";
});

btn.addEventListener("click", async () => {
  if (!deferredPrompt) return;

  deferredPrompt.prompt();
  const choice = await deferredPrompt.userChoice;

  if (choice.outcome === "accepted") {
    btn.style.display = "none";
  }

  deferredPrompt = null;
});
</script>

</body>
</html>
