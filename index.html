<!DOCTYPE html>
<html>
<head>
  <title>LIFORGE</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f1115;
      color: #e6e6e6;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 420px;
      margin-top: 40px;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    .card {
      background: #1a1d24;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
      background: #2a2f3a;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #4f7cff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #3b66ff;
    }

    .score {
      font-size: 28px;
      text-align: center;
      font-weight: bold;
      margin-top: 10px;
    }

    img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      border-radius: 12px;
      margin-top: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    img:active {
      transform: scale(1.05);
    }

    .history-item {
      margin-top: 10px;
      padding: 10px;
      background: #2a2f3a;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>LIFORGE</h1>

  <div class="card">
    <label>Sleep (hours)</label>
    <input id="sleep" type="number">

    <label>Steps</label>
    <input id="steps" type="number">

    <button onclick="save()">Save</button>
  </div>

  <div class="card">
    <div>Today score</div>
    <div class="score" id="score">--</div>
  </div>

  <div class="card">
    <div>Dog test 🐶</div>
    <img src="https://images.dog.ceo/breeds/dachshund/dachshund-1.jpg" onclick="zoom(this)">
  </div>

  <div class="card">
    <div>History</div>
    <div id="history"></div>
  </div>

</div>

<script>
function getData() {
  return JSON.parse(localStorage.getItem("liforge")) || [];
}

function saveData(data) {
  localStorage.setItem("liforge", JSON.stringify(data));
}

function save() {
  const sleep = Number(document.getElementById("sleep").value);
  const steps = Number(document.getElementById("steps").value);

  const score = Math.round(((Math.min(sleep / 7, 1) + Math.min(steps / 8000, 1)) / 2) * 100);

  document.getElementById("score").innerText = score + "%";

  const entry = {
    date: new Date().toISOString().split("T")[0],
    sleep,
    steps,
    score
  };

  let data = getData();
  data.unshift(entry);
  saveData(data);

  render();
}

function render() {
  const data = getData();
  const container = document.getElementById("history");

  container.innerHTML = "";

  data.slice(0, 5).forEach(d => {
    container.innerHTML += `
      <div class="history-item">
        <b>${d.date}</b><br>
        ${d.sleep}h sleep • ${d.steps} steps • ${d.score}%
      </div>
    `;
  });
}

function zoom(img) {
  if (img.style.transform === "scale(1.5)") {
    img.style.transform = "scale(1)";
  } else {
    img.style.transform = "scale(1.5)";
  }
}

render();
</script>

</body>
</html>
