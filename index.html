<!DOCTYPE html>
<html>
<head>
  <title>LIFORGE</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f1115">

<style>
*{box-sizing:border-box}
html,body{height:100%;margin:0;font-family:Arial;color:#e6e6e6}

body{
  min-height:100vh;
  background:url("liforge.png") center center/cover no-repeat fixed;
  position:relative;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.25);
  z-index:0;
  transition:.5s;
}

.app{
  position:relative;
  z-index:1;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:40px 12px;
}

.container{width:100%;max-width:420px}

.brand{text-align:center;margin-bottom:20px}
h1{text-align:center;margin:0}

.card{
  background:rgba(15,16,20,.18);
  backdrop-filter:blur(8px);
  padding:15px;
  margin-top:15px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.08);
}

input{
  width:100%;
  padding:10px;
  margin:5px 0 10px;
  border-radius:8px;
  border:none;
  background:#2a2f3a;
  color:#fff;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#4f7cff;
  color:#fff;
  font-weight:bold;
}

.hero{
  text-align:center;
  margin-top:10px;
}

.energyScore{
  font-size:56px;
  font-weight:bold;
}

.label{
  opacity:.6;
  font-size:12px;
  letter-spacing:2px;
}

.historyWrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-top:10px;
}

.historyTitle{
  font-size:12px;
  opacity:.6;
  margin-bottom:10px;
  text-align:center;
}
</style>
</head>

<body>

<div class="app">
<div class="container">

  <div class="brand">
    <h1>LIFORGE</h1>
    <div class="label">Forge Yourself</div>
  </div>

  <!-- SCORE -->
  <div class="hero">
    <div class="label">ENERGY SCORE</div>
    <div class="energyScore" id="score">--</div>
  </div>

  <!-- INPUT -->
  <div class="card">
    <div class="label">Sleep (hours)</div>
    <input id="sleep" type="number">

    <div class="label">Steps</div>
    <input id="steps" type="number">

    <button onclick="save()">Save</button>
  </div>

  <!-- HISTORY -->
  <div class="card">
    <div class="historyTitle">2026</div>
    <div id="history" class="historyWrap"></div>
  </div>

</div>
</div>

<script>

function getData(){
  return JSON.parse(localStorage.getItem("liforge")) || [];
}

function saveData(d){
  localStorage.setItem("liforge", JSON.stringify(d));
}

function calcScore(sleep, steps){
  return Math.round(
    ((Math.min(sleep / 7, 1) + Math.min(steps / 8000, 1)) / 2) * 100
  );
}

function getArrowFromScore(score){
  if(score >= 85) return "↑↑";
  if(score >= 65) return "↑";
  if(score >= 40) return "→";
  if(score >= 20) return "↓";
  return "↓↓";
}

function save(){
  const sleep = Number(document.getElementById("sleep").value);
  const steps = Number(document.getElementById("steps").value);

  const score = calcScore(sleep, steps);

  document.getElementById("score").innerText = score + "%";

  let data = getData();

  data.unshift({
    date: new Date().toISOString().split("T")[0],
    sleep,
    steps,
    score
  });

  saveData(data);
  render();
}

function render(){
  const c = document.getElementById("history");
  c.innerHTML = "";

  const data = getData().slice(0, 10);

  let html = "";
  let prev = null;

  data.forEach(d => {

    const trend = prev !== null
      ? (d.score > prev ? "↑" : d.score < prev ? "↓" : "→")
      : "→";

    prev = d.score;

    const globalArrow = getArrowFromScore(d.score);

    html += `
      <div style="
        display:flex;
        justify-content:center;
        align-items:center;
        gap:14px;
        margin:10px 0;
        font-size:18px;
      ">
        <div style="color:#7cf7ff;text-shadow:0 0 10px rgba(124,247,255,.5)">
          ${d.sleep}h
        </div>

        <div style="opacity:.4">|</div>

        <div style="color:#7cf7ff;text-shadow:0 0 10px rgba(124,247,255,.5)">
          ${d.steps}
        </div>

        <div style="opacity:.4">=</div>

        <div style="font-size:22px;color:#7cf7ff;text-shadow:0 0 18px rgba(124,247,255,.8)">
          ${globalArrow} ${d.score}%
        </div>
      </div>
    `;
  });

  c.innerHTML = html;
}

render();

</script>

</body>
</html>
