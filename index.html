<!DOCTYPE html>
<html>
<head>
  <title>LIFORGE</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1b1f2a, #0b0d12);
      color: #fff;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 420px;
      margin-top: 50px;
    }

    h1 {
      text-align: center;
      background: linear-gradient(90deg, #ff4d4d, #ffb84d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 42px;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 15px;
      border-radius: 14px;
      margin-top: 15px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
      background: #111521;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #ff4d4d, #ff9a3c);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      transform: scale(1.02);
    }

    .score {
      font-size: 34px;
      text-align: center;
      font-weight: bold;
      color: #ffb84d;
    }

    .small {
      opacity: 0.7;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>LIFORGE</h1>
  <div class="small">Daily System</div>

  <div class="card">
    <label>Sleep (hours)</label>
    <input id="sleep" type="number">

    <label>Steps</label>
    <input id="steps" type="number">

    <button onclick="saveDay()">Save</button>
  </div>

  <div class="card">
    <div class="small">Today Score</div>
    <div class="score" id="todayScore">--</div>
  </div>

  <div class="card">
    <div class="small">History</div>
    <div id="history"></div>
  </div>

</div>

<script>
function getData() {
  return JSON.parse(localStorage.getItem("liforge")) || [];
}

function saveData(data) {
  localStorage.setItem("liforge", JSON.stringify(data));
}

function saveDay() {
  const sleep = Number(document.getElementById("sleep").value);
  const steps = Number(document.getElementById("steps").value);

  const score = Math.round(
    ((Math.min(sleep / 7, 1) + Math.min(steps / 8000, 1)) / 2) * 100
  );

  document.getElementById("todayScore").innerText = score + "%";

  const entry = {
    date: new Date().toISOString().split("T")[0],
    sleep,
    steps,
    score
  };

  let data = getData();
  data.unshift(entry);
  saveData(data);

  renderHistory();
}

function renderHistory() {
  const data = getData();
  const container = document.getElementById("history");

  container.innerHTML = "";

  data.slice(0, 5).forEach(d => {
    container.innerHTML += `
      <div style="margin-top:10px; padding:10px; background:#2a2f3a; border-radius:8px;">
        <b>${d.date}</b><br>
        ${d.sleep}h sleep • ${d.steps} steps • ${d.score}%
      </div>
    `;
  });
}

renderHistory();
</script>

</body>
</html>
