<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>LIFORGE v0.9</title>


<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">


<meta name="theme-color" content="#000000">

<meta name="mobile-web-app-capable" content="yes">

<meta name="color-scheme" content="dark">


</head>



<body>



<!-- =====================
     BACKGROUND
===================== -->


<div class="background"></div>





<!-- =====================
     INTRO
===================== -->


<div id="intro">


<div class="startPanel" onclick="enterSystem()">

  <div class="startIcon">
    ◈
  </div>

  <div class="startText">
    GO INSIDE
  </div>

</div>


</div>







<!-- =====================
     APP
===================== -->


<div id="app">


<div class="overlay"></div>





<div class="container">


<div class="inner">





<!-- =====================
     DASHBOARD
===================== -->


<div class="hero">


<div id="dashboard">


Loading...


</div>

</div>


<!-- =====================
     UPDATE PAGE
===================== -->


<section 
id="updatePage"
class="page">

     
     

<div class="panel">


<div class="statLabel">

UPDATE TODAY

</div>

     <div class="inputGrid">


<div class="statCard">

<div class="statLabel">

Sleep

</div>


<input 
id="sleep"
type="number"
placeholder="Hours">


</div>




<div class="statCard">


<div class="statLabel">

Steps

</div>


<input 
id="steps"
type="number"
placeholder="Steps">


</div>




<div class="statCard">


<div class="statLabel">

Training

</div>


<input 
id="training"
type="number"
placeholder="Sessions">


</div>




<div class="statCard">


<div class="statLabel">

Water

</div>


<input 
id="water"
type="number"
placeholder="Liters">


</div>


     </div>
<button onclick="save()">

Update Today

</button>

</div>


</section>


<!-- =====================
     HISTORY PANEL
===================== -->

<section
id="historyPage"
class="page">

<div class="panel">

<div class="statLabel">

HISTORY

</div>


<div id="historyList">

</div>


</div>

</section>

     <!-- =====================
     SETTINGS PAGE
===================== -->

<section
id="settingsPage"
class="page">

<div class="panel">

<div class="statLabel">

DIRECTION

</div>

     <div class="statCard">

<div class="statLabel">

Sleep

</div>


<input 
id="sleep"
type="number"
placeholder="Hours">


     </div>
     
<div class="statCard">



<div class="statLabel">

Steps target

</div>



<input 
id="set_steps"
type="number">



</div>









<div class="statCard">



<div class="statLabel">

Training target

</div>



<input 
id="set_training"
type="number">



</div>








<div class="statCard">



<div class="statLabel">

Water target

</div>



<input 
id="set_water"
type="number">



</div>








<div class="statCard">



<button onclick="saveMetrics()">

Save metrics

</button>
</div>

</section>

<!-- =====================
     TOAST
===================== -->
<!-- =====================
     BOTTOM NAVIGATION
===================== -->


<nav class="bottomNav">


<button onclick="showPage('core')" class="navCore">

<svg class="coreIcon" viewBox="0 0 100 100">
  
  <polygon 
    points="50,8 90,28 90,72 50,92 10,72 10,28"
    fill="none"
    stroke="#d8b84c"
    stroke-width="6"
    stroke-linejoin="round"
  />

</svg>

</button>



<button onclick="showPage('update')" class="navUpdate">

<svg class="updateIcon" viewBox="0 0 100 100">

  <polyline
    points="15,60 50,25 85,60"
    fill="none"
    stroke="#35d9ff"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <line
    x1="15"
    y1="78"
    x2="85"
    y2="78"
    stroke="#35d9ff"
    stroke-width="8"
    stroke-linecap="round"
  />

</svg>

</button>

<button onclick="showPage('history')" class="navHistory">

     <svg class="historyIcon" viewBox="0 0 100 100">

  <!-- ramka -->
  <rect
    x="8"
    y="22"
    width="76"
    height="70"
    rx="8"
    fill="none"
    stroke="#e6e6e6"
    stroke-width="6"
  />

  <!-- trend -->
  <polyline
  points="
  18,62
  35,52
  48,57
  62,40
  75,48
  85,32
  "
  fill="none"
  stroke="#e6e6e6"
  stroke-width="6"
  stroke-linecap="round"
  stroke-linejoin="round"
/>

</svg>

<button id="nav-settings" onclick="showPage('settings')">

<svg class="directionIcon" viewBox="0 0 100 100">

  <path
    d="
    M42 12
    H58
    L62 28
    C68 30 72 34 76 38
    L92 42
    V58
    L76 62
    C72 68 68 72 62 76
    L58 92
    H42
    L38 76
    C32 72 28 68 24 62
    L8 58
    V42
    L24 38
    C28 32 32 28 38 24
    Z
    "
    fill="none"
    stroke="#e6e6e6"
    stroke-width="6"
    stroke-linejoin="round"
  />

  <circle
    cx="50"
    cy="50"
    r="15"
    fill="none"
    stroke="#e6e6e6"
    stroke-width="6"
  />

</svg>

</svg>


</nav>
<div id="toast"></div>






<!-- =====================
     APP SCRIPT
===================== -->


<script src="app.js"></script>



</body>


</html>
