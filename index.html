<!DOCTYPE html>
<html>
<head>
  <title>LIFORGE</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f1115;
      color: #e6e6e6;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 420px;
      margin-top: 50px;
    }

    h1 { text-align: center; }

    .card {
      background: #1a1d24;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
      background: #2a2f3a;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #4f7cff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .score {
      font-size: 34px;
      text-align: center;
      font-weight: bold;
    }

    .small {
      opacity: 0.7;
      text-align: center;
      font-size: 12px;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>LIFORGE</h1>
  <div class="small">System Dashboard</div>

  <div class="card">
    <label>Sleep</label>
    <input id="sleep" type="number">

    <label>Steps</label>
    <input id="steps" type="number">

    <button onclick="saveDay()">Save</button>
  </div>

  <div class="card">
    <div class="small">Today Score</div>
    <div class="score" id="todayScore">--</div>
    <div class="small" id="streak">Streak: 0 🔥</div>
  </div>

  <div class="card">
    <div class="small">History</div>
    <div id="history"></div>
  </div>

</div>

<script>
function getData() {
  return JSON.parse(localStorage.getItem("liforge")) || [];
}

function saveData(data) {
  localStorage.setItem("liforge", JSON.stringify(data));
}

function getColor(score) {
  if (score >= 85) return "#4ade80"; // green
  if (score >= 60) return "#facc15"; // yellow
  return "#f87171"; // red
}

function calcStreak(data) {
  if (data.length === 0) return 0;

  let streak = 1;
  for (let i = 1; i < data.length; i++) {
    const prev = new Date(data[i-1].date);
    const curr = new Date(data[i].date);

    const diff = (prev - curr) / (1000 * 60 * 60 * 24);

    if (diff === 1) streak++;
    else break;
  }
  return streak;
}

function saveDay() {
  const sleep = Number(document.getElementById("sleep").value);
  const steps = Number(document.getElementById("steps").value);

  const score = Math.round(((Math.min(sleep / 7, 1) + Math.min(steps / 8000, 1)) / 2) * 100);

  const entry = {
    date: new Date().toISOString().split("T")[0],
    sleep,
    steps,
    score
  };

  let data = getData();
  data.unshift(entry);

  saveData(data);

  document.getElementById("todayScore").innerText = score + "%";
  document.getElementById("todayScore").style.color = getColor(score);

  renderHistory();
  renderStreak();
}

function renderHistory() {
  const data = getData();
  const container = document.getElementById("history");

  container.innerHTML = "";

  data.slice(0, 7).forEach(d => {
    container.innerHTML += `
      <div style="margin-top:10px; padding:10px; background:#2a2f3a; border-radius:8px;">
        <b>${d.date}</b><br>
        ${d.sleep}h • ${d.steps} steps • 
        <span style="color:${getColor(d.score)}">${d.score}%</span>
      </div>
    `;
  });
}

function renderStreak() {
  const data = getData();
  const streak = calcStreak(data);
  document.getElementById("streak").innerText = "Streak: " + streak + " 🔥";
}

renderHistory();
renderStreak();
</script>

</body>
</html>
