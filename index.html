<!DOCTYPE html>
<html>
<head>
  <title>LIFORGE</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: #e6e6e6;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 420px;
      margin-top: 40px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: #1a1d24;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
      background: #2a2f3a;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #4f7cff;
      color: white;
      font-weight: bold;
    }

    .score {
      font-size: 34px;
      text-align: center;
      font-weight: bold;
    }

    .green { color: #4ade80; }
    .yellow { color: #facc15; }
    .red { color: #f87171; }

    .small {
      opacity: 0.7;
      font-size: 12px;
      text-align: center;
    }

    .streak {
      text-align: center;
      font-size: 18px;
      margin-top: 5px;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>LIFORGE</h1>
  <div class="small">Daily System</div>

  <div class="card">
    <label>Sleep</label>
    <input id="sleep" type="number">

    <label>Steps</label>
    <input id="steps" type="number">

    <button onclick="saveDay()">Save</button>
  </div>

  <div class="card">
    <div class="small">Today Score</div>
    <div class="score" id="todayScore">--</div>
    <div class="streak" id="streak">🔥 Streak: 0</div>
  </div>

  <div class="card">
    <div class="small">History</div>
    <div id="history"></div>
  </div>

</div>

<script>
function getData() {
  return JSON.parse(localStorage.getItem("liforge")) || [];
}

function saveData(data) {
  localStorage.setItem("liforge", JSON.stringify(data));
}

function calcScore(sleep, steps) {
  const sleepScore = Math.min(sleep / 7, 1);
  const stepsScore = Math.min(steps / 8000, 1);
  return Math.round(((sleepScore + stepsScore) / 2) * 100);
}

function getColor(score) {
  if (score >= 80) return "green";
  if (score >= 50) return "yellow";
  return "red";
}

function saveDay() {
  const sleep = Number(document.getElementById("sleep").value);
  const steps = Number(document.getElementById("steps").value);

  const score = calcScore(sleep, steps);

  const entry = {
    date: new Date().toISOString().split("T")[0],
    sleep,
    steps,
    score
  };

  let data = getData();
  data.unshift(entry);
  saveData(data);

  document.getElementById("todayScore").innerText = score + "%";
  document.getElementById("todayScore").className = "score " + getColor(score);

  renderHistory();
  renderStreak();
}

function renderHistory() {
  const data = getData();
  const container = document.getElementById("history");

  container.innerHTML = "";

  data.slice(0, 7).forEach(d => {
    container.innerHTML += `
      <div style="margin-top:10px; padding:10px; background:#2a2f3a; border-radius:8px;">
        <b>${d.date}</b><br>
        ${d.sleep}h • ${d.steps} steps • 
        <span class="${getColor(d.score)}">${d.score}%</span>
      </div>
    `;
  });
}

function renderStreak() {
  const data = getData();

  let streak = 0;
  for (let i = 0; i < data.length; i++) {
    if (data[i].score >= 70) streak++;
    else break;
  }

  document.getElementById("streak").innerText = "🔥 Streak: " + streak;
}

renderHistory();
renderStreak();
</script>

</body>
</html>
