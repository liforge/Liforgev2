<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LIFORGE</title>

<meta name="theme-color" content="#000000">

<style>
*{box-sizing:border-box}

html,body{
margin:0;
height:100%;
font-family:Arial;
color:#e6e6e6;
background:#000;
overflow:hidden;
}

/* SCREEN BASE */
.screen{
position:fixed;
inset:0;
width:100%;
height:100%;
}

/* INTRO */
#intro{
background:url('intro.png') center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
}

.enterBtn{
padding:16px 34px;
border-radius:30px;
font-size:16px;
font-weight:bold;
cursor:pointer;
border:1px solid rgba(255,255,255,.25);
background:rgba(0,0,0,.35);
backdrop-filter:blur(10px);
color:white;
transition:.2s;
}

.enterBtn:hover{
transform:scale(1.05);
background:rgba(255,255,255,.15);
}

/* APP */
#app{
display:none;
background:url('liforge.png') center/cover no-repeat;
}

/* DARK OVERLAY */
.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.45);
}

/* CONTENT */
.container{
position:relative;
z-index:2;
height:100%;
display:flex;
justify-content:center;
align-items:flex-start;
padding:40px 12px;
}

.inner{max-width:420px;width:100%}

.hero{text-align:center}

.logo{
font-size:54px;
font-weight:bold;
letter-spacing:2px;
text-shadow:0 0 25px rgba(124,247,255,.65);
margin-bottom:6px;
}

.sub{opacity:.6;font-size:12px;letter-spacing:2px;margin-bottom:10px}

.card{
margin-top:14px;
padding:15px;
border-radius:16px;
background:rgba(15,16,20,.18);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.08);
}

input{
width:120px;
padding:10px;
border-radius:10px;
border:none;
margin-top:8px;
background:#2a2f3a;
color:#fff;
text-align:center;
font-size:16px;
}

button{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-top:8px;
cursor:pointer;
color:#fff;
font-weight:bold;
}

.glassBtn{
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.15);
transition:.2s;
}

.glassBtn:hover{
transform:scale(1.02);
background:rgba(255,255,255,.12);
}

.score{
font-size:56px;
font-weight:bold;
text-shadow:0 0 20px rgba(124,247,255,.5);
}

#historyView{display:none}

.historyItem{
padding:10px 0;
border-bottom:1px solid rgba(255,255,255,.08);
display:flex;
justify-content:space-between;
font-size:13px;
}

.installTile{
margin-top:14px;
padding:14px;
border-radius:16px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.15);
text-align:center;
}

.installTitle{
font-size:13px;
opacity:.7;
margin-bottom:8px;
letter-spacing:1px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro" class="screen">
  <button class="enterBtn" onclick="enterSystem()">ENTER THE SYSTEM</button>
</div>

<!-- APP -->
<div id="app" class="screen">

<div class="overlay"></div>

<div class="container">
<div class="inner">

<div class="hero">
  <div class="logo">LIFORGE</div>
  <div class="sub">Forge Yourself</div>
  <div id="score" class="score">--</div>
</div>

<div id="installTile" class="installTile" style="display:none">
  <div class="installTitle">Zainstaluj LIFORGE</div>
  <button id="installBtn" class="glassBtn">Zainstaluj aplikację</button>
</div>

<div class="card">
  <div>Sleep</div>
  <input id="sleep" type="number">

  <div>Steps</div>
  <input id="steps" type="number">

  <button class="glassBtn" onclick="save()">Save</button>
</div>

<div class="card">
  <button class="glassBtn" onclick="showHistory()">History</button>
</div>

<div id="historyView" class="card">
  <button onclick="hideHistory()">← Back</button>
  <div id="history"></div>
</div>

</div>
</div>
</div>

<script>

function enterSystem(){
  document.getElementById("intro").style.display="none";
  document.getElementById("app").style.display="block";
}

/* 🔥 KLUCZOWA POPRAWKA: SERVICE WORKER */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}

/* INSTALL LOGIC */
let deferredPrompt = null;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;

  document.getElementById("installTile").style.display = "block";
});

document.getElementById("installBtn").addEventListener("click", async () => {
  if(!deferredPrompt) return;

  deferredPrompt.prompt();
  await deferredPrompt.userChoice;

  deferredPrompt = null;
  document.getElementById("installTile").style.display = "none";
});

function getData(){
  return JSON.parse(localStorage.getItem("liforge")||"[]");
}

function saveData(d){
  localStorage.setItem("liforge",JSON.stringify(d));
}

function calcScore(sleep,steps){
  return Math.round(((Math.min(sleep/7,1)+Math.min(steps/8000,1))/2)*100);
}

function getArrow(score){
  if(score>=85) return "↑↑";
  if(score>=65) return "↑";
  if(score>=40) return "→";
  if(score>=20) return "↓";
  return "↓↓";
}

function save(){
  const sleep=Number(document.getElementById("sleep").value);
  const steps=Number(document.getElementById("steps").value);

  const score=calcScore(sleep,steps);
  document.getElementById("score").textContent=score+"%";

  const data=getData();
  data.unshift({
    date:new Date().toISOString().split("T")[0],
    sleep,
    steps,
    score
  });

  saveData(data);
}

function renderHistory(){
  const h=document.getElementById("history");
  h.innerHTML="";

  getData().slice(0,10).forEach(d=>{
    h.innerHTML+=`
      <div class="historyItem">
        <div>${d.date} • ${d.sleep}h • ${d.steps}</div>
        <div>${d.score}% <span class="arrow">${getArrow(d.score)}</span></div>
      </div>
    `;
  });
}

function showHistory(){
  renderHistory();
  document.getElementById("historyView").style.display="block";
}

function hideHistory(){
  document.getElementById("historyView").style.display="none";
}

</script>

</body>
</html>
