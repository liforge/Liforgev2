<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LIFORGE v0.3.1</title>

<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:Arial;background:#0f1115;color:#e6e6e6}

body{
background:url('liforge.png') center/cover fixed no-repeat;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
z-index:0;
}

.app{
position:relative;
z-index:1;
height:100%;
padding:40px 12px;
display:flex;
justify-content:center;
align-items:flex-start;
}

.container{max-width:420px;width:100%}

/* HERO */
.hero{text-align:center}

.logo{
font-size:52px;
font-weight:bold;
text-shadow:0 0 20px rgba(124,247,255,.5);
margin-bottom:6px;
}

.sub{
opacity:.6;
font-size:12px;
letter-spacing:2px;
margin-bottom:10px;
}

/* SILHOUETTE */
.silhouette{
width:90px;
height:140px;
margin:0 auto 10px;
opacity:.35;
filter:drop-shadow(0 0 10px rgba(124,247,255,.25));
}

.card{
margin-top:14px;
padding:15px;
border-radius:16px;
background:rgba(15,16,20,.18);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.08);
}

/* INPUT ROW — FIX WIDTH ISSUE */
.row{
display:flex;
justify-content:space-between;
gap:10px;
}

input{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-top:8px;
background:#2a2f3a;
color:#fff;
}

.inputSmall{
max-width:120px;
}

/* BUTTONS */
button{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-top:8px;
background:#4f7cff;
color:#fff;
font-weight:bold;
cursor:pointer;
}

/* GLASS HISTORY BUTTON */
.glassBtn{
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.15);
font-weight:normal;
letter-spacing:1px;
}

/* SCORE */
.score{
font-size:56px;
font-weight:bold;
text-shadow:0 0 20px rgba(124,247,255,.5);
}

.label{
opacity:.65;
font-size:12px;
letter-spacing:2px;
}

/* HISTORY */
#historyView{display:none}

.historyItem{
padding:10px 0;
border-bottom:1px solid rgba(255,255,255,.08);
display:flex;
justify-content:space-between;
font-size:13px;
}

.arrow{margin-left:8px}
</style>
</head>

<body>

<div class="app">
<div class="container">

<!-- MAIN -->
<div id="mainView">

  <div class="hero">

    <div class="logo">LIFORGE</div>
    <div class="sub">Forge Yourself</div>

    <!-- SILHOUETTE -->
    <svg class="silhouette" viewBox="0 0 100 180">
      <circle cx="50" cy="25" r="18" fill="white"/>
      <path d="M50 45
               C30 55, 30 85, 35 110
               C38 130, 32 150, 25 170
               L40 170
               C45 150, 48 135, 50 120
               C52 135, 55 150, 60 170
               L75 170
               C68 150, 62 130, 65 110
               C70 85, 70 55, 50 45 Z"
            fill="white"/>
    </svg>

    <div id="score" class="score">--</div>
  </div>

  <div class="card">

    <div class="label">Sleep (hours)</div>
    <input id="sleep" type="number" class="inputSmall">

    <div class="label">Steps</div>
    <input id="steps" type="number" class="inputSmall">

    <button onclick="save()">Save</button>
  </div>

  <div class="card">
    <button class="glassBtn" onclick="showHistory()">History</button>
  </div>

</div>

<!-- HISTORY -->
<div id="historyView" class="card">

  <button onclick="hideHistory()">← Back</button>

  <div id="history"></div>

</div>

</div>
</div>

<script>

function getData(){
  return JSON.parse(localStorage.getItem("liforge")||"[]");
}

function saveData(d){
  localStorage.setItem("liforge",JSON.stringify(d));
}

function calcScore(sleep,steps){
  return Math.round(((Math.min(sleep/7,1)+Math.min(steps/8000,1))/2)*100);
}

function getArrow(score){
  if(score>=85) return "↑↑";
  if(score>=65) return "↑";
  if(score>=40) return "→";
  if(score>=20) return "↓";
  return "↓↓";
}

function save(){
  const sleep=Number(document.getElementById("sleep").value);
  const steps=Number(document.getElementById("steps").value);

  const score=calcScore(sleep,steps);

  document.getElementById("score").textContent=score+"%";

  const data=getData();
  data.unshift({
    date:new Date().toISOString().split("T")[0],
    sleep,
    steps,
    score
  });

  saveData(data);
}

function renderHistory(){
  const h=document.getElementById("history");
  h.innerHTML="";

  getData().slice(0,10).forEach(d=>{
    h.innerHTML+=`
      <div class="historyItem">
        <div>${d.date} • ${d.sleep}h • ${d.steps}</div>
        <div>${d.score}% <span class="arrow">${getArrow(d.score)}</span></div>
      </div>
    `;
  });
}

function showHistory(){
  renderHistory();
  document.getElementById("mainView").style.display="none";
  document.getElementById("historyView").style.display="block";
}

function hideHistory(){
  document.getElementById("historyView").style.display="none";
  document.getElementById("mainView").style.display="block";
}

</script>

</body>
</html>
