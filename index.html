<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>LIFORGE v0.9</title>


<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">


<meta name="theme-color" content="#000000">

<meta name="mobile-web-app-capable" content="yes">

<meta name="color-scheme" content="dark">


</head>



<body>



<!-- =====================
     BACKGROUND
===================== -->


<div class="background"></div>





<!-- =====================
     INTRO
===================== -->


<div id="intro">


<div class="startPanel" onclick="enterSystem()">

  <div class="startIcon">
    ◈
  </div>

  <div class="startText">
    GO INSIDE
  </div>

</div>


</div>







<!-- =====================
     APP
===================== -->


<div id="app">


<div class="overlay"></div>





<div class="container">


<div class="inner">





<!-- =====================
     DASHBOARD
===================== -->


<div class="hero">


<div id="dashboard">


Loading...


</div>

</div>


<!-- =====================
     UPDATE PAGE
===================== -->


<section 
id="updatePage"
class="page">

     
     

<div class="panel">


<div class="statLabel">

UPDATE TODAY

</div>

     <div class="inputGrid">


<div class="statCard">

<div class="statLabel">

Sleep

</div>


<input 
id="sleep"
type="number"
placeholder="Hours">


</div>




<div class="statCard">


<div class="statLabel">

Steps

</div>


<input 
id="steps"
type="number"
placeholder="Steps">


</div>




<div class="statCard">


<div class="statLabel">

Training

</div>


<input 
id="training"
type="number"
placeholder="Sessions">


</div>




<div class="statCard">


<div class="statLabel">

Water

</div>


<input 
id="water"
type="number"
placeholder="Liters">


</div>


     </div>


</div>


</section>







<!-- =====================
     HISTORY WINDOW
===================== -->


<div 
id="historyView" 
class="historyOverlay">



<div class="historyCard">



<button onclick="hideHistory()">

Back

</button>




<div id="history"></div>



</div>



</div>









<!-- =====================
     SETTINGS WINDOW
===================== -->


<div 
id="settingsView" 
class="historyOverlay">



<div class="historyCard">





<button onclick="hideSettings()">

Back

</button>







<div class="statCard">



<div class="statLabel">

Sleep target

</div>



<input 
id="set_sleep"
type="number">



</div>








<div class="statCard">



<div class="statLabel">

Steps target

</div>



<input 
id="set_steps"
type="number">



</div>









<div class="statCard">



<div class="statLabel">

Training target

</div>



<input 
id="set_training"
type="number">



</div>








<div class="statCard">



<div class="statLabel">

Water target

</div>



<input 
id="set_water"
type="number">



</div>








<div class="statCard">



<button onclick="saveMetrics()">

Save metrics

</button>



</div>







</div>



</div>









<!-- =====================
     TOAST
===================== -->
<!-- =====================
     BOTTOM NAVIGATION
===================== -->


<nav class="bottomNav">


<button onclick="showPage('core')">

◈

</button>



<button onclick="showPage('update')">

◆

</button>




<button onclick="showPage('history')">

♤

</button>


</nav>
<div id="toast"></div>






<!-- =====================
     APP SCRIPT
===================== -->


<script src="app.js"></script>



</body>


</html>
