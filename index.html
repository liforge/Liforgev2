<!DOCTYPE html>
<html>
<head>
  <title>LIFORGE</title>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: 40px auto;
    }
    input {
      margin: 5px 0;
      padding: 5px;
    }
    .card {
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>LIFORGE Dashboard</h1>

<h3>Daily Check-in</h3>

<label>Sleep (hours)</label><br>
<input id="sleep" type="number"><br>

<label>Steps</label><br>
<input id="steps" type="number"><br><br>

<button onclick="saveData()">Save</button>

<h3>Result</h3>
<h2 id="result">---</h2>

<h3>History</h3>
<div id="history"></div>

<script>
function saveData() {
  const sleep = Number(document.getElementById("sleep").value);
  const steps = Number(document.getElementById("steps").value);

  const sleepScore = Math.min(sleep / 7, 1);
  const stepsScore = Math.min(steps / 8000, 1);

  const score = Math.round(((sleepScore + stepsScore) / 2) * 100);

  document.getElementById("result").innerText = score + "%";

  const entry = {
    date: new Date().toLocaleDateString(),
    sleep,
    steps,
    score
  };

  let data = JSON.parse(localStorage.getItem("liforge")) || [];
  data.unshift(entry);

  localStorage.setItem("liforge", JSON.stringify(data));

  renderHistory();
}

function renderHistory() {
  let data = JSON.parse(localStorage.getItem("liforge")) || [];
  const container = document.getElementById("history");

  container.innerHTML = "";

  data.forEach(d => {
    container.innerHTML += `
      <div class="card">
        <b>${d.date}</b><br>
        Sleep: ${d.sleep}h<br>
        Steps: ${d.steps}<br>
        Score: ${d.score}%
      </div>
    `;
  });
}

renderHistory();
</script>

</body>
</html>
