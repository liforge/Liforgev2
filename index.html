<!DOCTYPE html>
<html>
<head>
  <title>LIFORGE</title>
  <style>
    body {
      font-family: Arial;
      max-width: 650px;
      margin: 40px auto;
    }
    input {
      margin: 5px 0;
      padding: 6px;
    }
    .card {
      border: 1px solid #ddd;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<h1>LIFORGE Dashboard</h1>

<h3>Daily Check-in</h3>

<label>Sleep (hours)</label><br>
<input id="sleep" type="number"><br>

<label>Steps</label><br>
<input id="steps" type="number"><br><br>

<button onclick="saveDay()">Save</button>

<h2 id="todayScore">---</h2>

<hr>

<h3>Weekly Goals</h3>

<label>Weekly steps target</label><br>
<input id="weeklyStepsGoal" type="number" placeholder="e.g. 56000"><br>

<label>Weekly sleep target (hours total)</label><br>
<input id="weeklySleepGoal" type="number" placeholder="e.g. 49"><br><br>

<button onclick="renderWeek()">Update Week</button>

<div id="weekSummary" class="card"></div>

<hr>

<h3>History</h3>
<div id="history"></div>

<script>
function getData() {
  return JSON.parse(localStorage.getItem("liforge")) || [];
}

function saveData(data) {
  localStorage.setItem("liforge", JSON.stringify(data));
}

function saveDay() {
  const sleep = Number(document.getElementById("sleep").value);
  const steps = Number(document.getElementById("steps").value);

  const score =
    Math.round(((Math.min(sleep / 7, 1) + Math.min(steps / 8000, 1)) / 2) * 100);

  document.getElementById("todayScore").innerText = "Today: " + score + "%";

  const entry = {
    date: new Date().toISOString().split("T")[0],
    sleep,
    steps,
    score
  };

  let data = getData();
  data.unshift(entry);
  saveData(data);

  renderHistory();
  renderWeek();
}

function renderHistory() {
  const data = getData();
  const container = document.getElementById("history");

  container.innerHTML = "";

  data.slice(0, 10).forEach(d => {
    container.innerHTML += `
      <div class="card">
        <b>${d.date}</b><br>
        Sleep: ${d.sleep}h<br>
        Steps: ${d.steps}<br>
        Score: ${d.score}%
      </div>
    `;
  });
}

function renderWeek() {
  const data = getData();

  const sleepGoal = Number(document.getElementById("weeklySleepGoal").value) || 49;
  const stepsGoal = Number(document.getElementById("weeklyStepsGoal").value) || 56000;

  const last7 = data.slice(0, 7);

  const totalSleep = last7.reduce((sum, d) => sum + d.sleep, 0);
  const totalSteps = last7.reduce((sum, d) => sum + d.steps, 0);

  const sleepProgress = Math.min(totalSleep / sleepGoal, 1) * 100;
  const stepsProgress = Math.min(totalSteps / stepsGoal, 1) * 100;

  const avg = Math.round((sleepProgress + stepsProgress) / 2);

  document.getElementById("weekSummary").innerHTML = `
    <b>Weekly progress</b><br><br>
    Sleep: ${totalSleep} / ${sleepGoal}h (${Math.round(sleepProgress)}%)<br>
    Steps: ${totalSteps} / ${stepsGoal} (${Math.round(stepsProgress)}%)<br><br>
    <b>Overall: ${avg}%</b>
  `;
}

renderHistory();
renderWeek();
</script>

</body>
</html>
