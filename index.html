<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LIFORGE</title>

<meta name="theme-color" content="#000000">

<!-- 🔥 PWA MANIFEST (OBOWIĄZKOWE) -->
<link rel="manifest" href="./manifest.json">

<style>
*{box-sizing:border-box}

html,body{
margin:0;
height:100%;
font-family:Arial;
color:#e6e6e6;
background:#000;
overflow:hidden;
}

.screen{
position:fixed;
inset:0;
width:100%;
height:100%;
}

#intro{
background:url('intro.png') center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
}

.enterBtn{
padding:16px 34px;
border-radius:30px;
font-size:16px;
font-weight:bold;
cursor:pointer;
border:1px solid rgba(255,255,255,.25);
background:rgba(0,0,0,.35);
backdrop-filter:blur(10px);
color:white;
}

#app{
display:none;
background:url('liforge.png') center/cover no-repeat;
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.45);
}

.container{
position:relative;
z-index:2;
height:100%;
display:flex;
justify-content:center;
align-items:flex-start;
padding:40px 12px;
}

.inner{max-width:420px;width:100%}

.hero{text-align:center}

.logo{
font-size:54px;
font-weight:bold;
letter-spacing:2px;
text-shadow:0 0 25px rgba(124,247,255,.65);
margin-bottom:6px;
}

.sub{opacity:.6;font-size:12px;letter-spacing:2px;margin-bottom:10px}

.card{
margin-top:14px;
padding:15px;
border-radius:16px;
background:rgba(15,16,20,.18);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.08);
}

input{
width:120px;
padding:10px;
border-radius:10px;
border:none;
margin-top:8px;
background:#2a2f3a;
color:#fff;
text-align:center;
font-size:16px;
}

button{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-top:8px;
cursor:pointer;
color:#fff;
font-weight:bold;
background:rgba(255,255,255,.08);
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro" class="screen">
  <button class="enterBtn" onclick="enterSystem()">ENTER THE SYSTEM</button>
</div>

<!-- APP -->
<div id="app" class="screen">
<div class="overlay"></div>

<div class="container">
<div class="inner">

<div class="card">
  <div>Sleep</div>
  <input id="sleep" type="number">

  <div>Steps</div>
  <input id="steps" type="number">

  <button onclick="save()">Save</button>
</div>

</div>
</div>
</div>

<script>

function enterSystem(){
  document.getElementById("intro").style.display="none";
  document.getElementById("app").style.display="block";
}

/* 🔥 SERVICE WORKER FIX */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}

/* INSTALL HOOK (NIE UI, TYLKO DETEKCJA) */
let deferredPrompt = null;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  console.log("PWA install available");
});

function save(){
  alert("Saved");
}

</script>

</body>
</html>
