<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LIFORGE v0.3.4</title>

<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:Arial;background:#0f1115;color:#e6e6e6}

body{
background:url('liforge.png') center/cover fixed no-repeat;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
z-index:0;
}

/* APP */
.app{
position:relative;
z-index:1;
height:100%;
padding:40px 12px;
display:flex;
justify-content:center;
align-items:flex-start;
}

/* INTRO */
#intro{
position:fixed;
inset:0;
z-index:9999;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(8,10,18,.7);
backdrop-filter:blur(10px);
transition:.8s ease;
}

#intro.hide{
opacity:0;
pointer-events:none;
}

.enterBtn{
padding:16px 34px;
border:none;
border-radius:30px;
font-size:16px;
font-weight:bold;
background:#4f7cff;
color:white;
cursor:pointer;
box-shadow:0 0 25px rgba(79,124,255,.4);
}

/* CONTAINER */
.container{max-width:420px;width:100%}

/* HERO */
.hero{text-align:center}

.logo{
font-size:54px;
font-weight:bold;
letter-spacing:2px;
text-shadow:0 0 25px rgba(124,247,255,.65);
margin-bottom:6px;
animation:logoPulse 3.5s ease-in-out infinite;
}

@keyframes logoPulse{
0%{transform:scale(1)}
50%{transform:scale(1.04)}
100%{transform:scale(1)}
}

.sub{
opacity:.6;
font-size:12px;
letter-spacing:2px;
margin-bottom:10px;
}

/* SILHOUETTE */
.silhouette{
width:90px;
height:140px;
margin:0 auto 10px;
opacity:.35;
filter:drop-shadow(0 0 12px rgba(124,247,255,.25));
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-6px)}
100%{transform:translateY(0px)}
}

.silhouette circle,
.silhouette path{
animation:glow 2.8s ease-in-out infinite;
}

@keyframes glow{
0%{fill:rgba(255,255,255,.7)}
50%{fill:rgba(124,247,255,.95)}
100%{fill:rgba(255,255,255,.7)}
}

/* CARD */
.card{
margin-top:14px;
padding:15px;
border-radius:16px;
background:rgba(15,16,20,.18);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.08);
}

/* INPUT (FIX WIDTH) */
input{
width:120px;
padding:10px;
border-radius:10px;
border:none;
margin-top:8px;
background:#2a2f3a;
color:#fff;
text-align:center;
font-size:16px;
}

/* BUTTONS */
button{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-top:8px;
background:#4f7cff;
color:#fff;
font-weight:bold;
cursor:pointer;
}

/* GLASS BUTTON */
.glassBtn{
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.15);
font-weight:normal;
letter-spacing:1px;
transition:.2s;
}

.glassBtn:hover{
background:rgba(255,255,255,.12);
transform:scale(1.02);
}

/* SCORE */
.score{
font-size:56px;
font-weight:bold;
text-shadow:0 0 20px rgba(124,247,255,.5);
}

/* HISTORY */
#historyView{display:none}

.historyItem{
padding:10px 0;
border-bottom:1px solid rgba(255,255,255,.08);
display:flex;
justify-content:space-between;
font-size:13px;
}

.arrow{margin-left:8px}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div style="font-size:60px">⚡</div>
  <div style="font-size:28px;font-weight:bold;letter-spacing:2px;margin-top:10px">LIFORGE</div>
  <div style="opacity:.6;margin:10px 0 30px">Forge Yourself</div>

  <button class="enterBtn" onclick="enterSystem()">ENTER THE SYSTEM</button>
</div>

<!-- APP -->
<div class="app">
<div class="container">

<!-- MAIN -->
<div id="mainView">

  <div class="hero">

    <div class="logo">LIFORGE</div>
    <div class="sub">Forge Yourself</div>

    <!-- SILHOUETTE -->
    <svg class="silhouette" viewBox="0 0 100 200">
      <circle cx="50" cy="25" r="18"/>
      <path d="
        M50 45
        C35 55,30 75,35 95
        C38 110,30 130,28 150
        C26 165,30 180,40 190
        C45 180,47 165,48 150
        C49 135,51 120,50 105
        C49 120,51 135,52 150
        C53 165,55 180,60 190
        C70 180,74 165,72 150
        C70 130,62 110,65 95
        C70 75,65 55,50 45
      "/>
    </svg>

    <div id="score" class="score">--</div>
  </div>

  <div class="card">
    <div>Sleep</div>
    <input id="sleep" type="number">

    <div>Steps</div>
    <input id="steps" type="number">

    <button class="glassBtn" onclick="save()">Save</button>
  </div>

  <div class="card">
    <button class="glassBtn" onclick="showHistory()">History</button>
  </div>

</div>

<!-- HISTORY -->
<div id="historyView" class="card">

  <button onclick="hideHistory()">← Back</button>
  <div id="history"></div>

</div>

</div>
</div>

<script>

function enterSystem(){
  document.getElementById("intro").classList.add("hide");
}

function getData(){
  return JSON.parse(localStorage.getItem("liforge")||"[]");
}

function saveData(d){
  localStorage.setItem("liforge",JSON.stringify(d));
}

function calcScore(sleep,steps){
  return Math.round(((Math.min(sleep/7,1)+Math.min(steps/8000,1))/2)*100);
}

function getArrow(score){
  if(score>=85) return "↑↑";
  if(score>=65) return "↑";
  if(score>=40) return "→";
  if(score>=20) return "↓";
  return "↓↓";
}

function save(){
  const sleep=Number(document.getElementById("sleep").value);
  const steps=Number(document.getElementById("steps").value);

  const score=calcScore(sleep,steps);

  document.getElementById("score").textContent=score+"%";

  const data=getData();
  data.unshift({
    date:new Date().toISOString().split("T")[0],
    sleep,
    steps,
    score
  });

  saveData(data);
}

function renderHistory(){
  const h=document.getElementById("history");
  h.innerHTML="";

  getData().slice(0,10).forEach(d=>{
    h.innerHTML+=`
      <div class="historyItem">
        <div>${d.date} • ${d.sleep}h • ${d.steps}</div>
        <div>${d.score}% <span class="arrow">${getArrow(d.score)}</span></div>
      </div>
    `;
  });
}

function showHistory(){
  renderHistory();
  document.getElementById("mainView").style.display="none";
  document.getElementById("historyView").style.display="block";
}

function hideHistory(){
  document.getElementById("historyView").style.display="none";
  document.getElementById("mainView").style.display="block";
}

</script>

</body>
</html>
