<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LIFORGE v0.4</title>

<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  height:100%;
  font-family:Arial;
  color:#e6e6e6;
  background:#000;
}

/* SCREENY */
.screen{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
}

/* INTRO */
#intro{
  background:url('intro.png') center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
}

.enterBtn{
  padding:16px 34px;
  border-radius:30px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  border:1px solid rgba(255,255,255,.25);
  background:rgba(0,0,0,.35);
  backdrop-filter:blur(10px);
  color:white;
}

/* APP */
#app{
  display:none;
  background:url('liforge.png') center/cover no-repeat;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.45);
}

/* MAIN LAYOUT */
.container{
  position:relative;
  z-index:2;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:40px 12px;
}

.inner{
  max-width:420px;
  width:100%;
  display:flex;
  flex-direction:column;
  gap:16px;
}

/* HERO */
.hero{
  height:240px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.heroPlaceholder{
  width:140px;
  height:140px;
  border-radius:20px;
  border:1px dashed rgba(255,255,255,.2);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:12px;
  opacity:.6;
}

/* PANELS */
.panel{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.statCard{
  padding:15px;
  border-radius:16px;
  background:rgba(15,16,20,.18);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.08);

  display:flex;
  flex-direction:column;
  gap:8px;

  transition:transform .15s ease, border .15s ease;
}

.statCard:hover{
  transform:translateY(-2px);
  border:1px solid rgba(255,255,255,.2);
}

.statLabel{
  font-size:13px;
  opacity:.8;
}

input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:8px;
  background:#2a2f3a;
  color:#fff;
  text-align:center;
}

button{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:8px;
  cursor:pointer;
  color:#fff;
  font-weight:bold;
  background:rgba(255,255,255,.08);
}

/* HISTORY OVERLAY */
.historyOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:10;
}

.historyCard{
  width:90%;
  max-width:420px;
  padding:15px;
  border-radius:16px;
  background:rgba(15,16,20,.95);
  border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(10px);
}

.historyItem{
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;
  justify-content:space-between;
  font-size:13px;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro" class="screen">
  <button class="enterBtn" onclick="enterSystem()">ENTER</button>
</div>

<!-- APP -->
<div id="app" class="screen">
  <div class="overlay"></div>

  <div class="container">
    <div class="inner">

      <!-- HERO -->
      <div class="hero">
        <div class="heroPlaceholder">SVG PLACEHOLDER</div>
      </div>
      
      <!-- STATS SYSTEM -->
<div class="panel">

  <div class="statCard">
    <div class="statLabel">Sleep</div>
    <input id="sleep" type="number" min="0">
  </div>

  <div class="statCard">
    <div class="statLabel">Steps</div>
    <input id="steps" type="number" min="0">
  </div>

  <div class="statCard">
    <div class="statLabel">Training (hours)</div>
    <input id="training" type="number" min="0">
  </div>
      </div>

      <!-- ACTIONS -->
      <div class="panel">
        <div class="card">
          <button onclick="save()">Save</button>
        </div>
<div class="card">
  <button onclick="showHistory()">History</button>
</div>

<div class="card">
  <button onclick="clearHistory()">Clear history</button>
</div>
        <div class="card">
          <button onclick="showHistory()">History</button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- HISTORY OVERLAY -->
<div id="historyView" class="historyOverlay">
  <div class="historyCard">
    <button onclick="hideHistory()">Back</button>
    <div id="history"></div>
  </div>
</div>

<script>

// ENTER
function enterSystem(){
  document.getElementById("intro").style.display="none";
  document.getElementById("app").style.display="block";
}

// STORAGE
function getData(){
  try{
    const d = localStorage.getItem("liforge");
    return d ? JSON.parse(d) : [];
  }catch(e){
    return [];
  }
}

function saveData(data){
  localStorage.setItem("liforge", JSON.stringify(data));
}

// SCORE
function calcScore(sleep,steps){
  sleep = sleep || 0;
  steps = steps || 0;
  return Math.round(((Math.min(sleep/7,1)+Math.min(steps/8000,1))/2)*100);
}

// SAVE
function save(){
  const sleep = Number(document.getElementById("sleep").value || 0);
  const steps = Number(document.getElementById("steps").value || 0);

  const score = calcScore(sleep,steps);

  const data = getData();

  data.unshift({
    date: new Date().toISOString().split("T")[0],
    sleep,
    steps,
    score
  });

  saveData(data);

  alert("Saved");
}

// HISTORY
function renderHistory(){
  const h = document.getElementById("history");
  h.innerHTML = "";

  const data = getData();

  if(data.length === 0){
    h.innerHTML = "<div>No data yet</div>";
    return;
  }

  data.slice(0,10).forEach(d=>{
    h.innerHTML += `
      <div class="historyItem">
        <div>${d.date} • ${d.sleep}h • ${d.steps}</div>
        <div>${d.score}%</div>
      </div>
    `;
  });
}

function showHistory(){
  document.getElementById("historyView").style.display="flex";
  renderHistory();
}

function hideHistory(){
  document.getElementById("historyView").style.display="none";
}
  function clearHistory(){
  localStorage.removeItem("liforge");
  renderHistory();
  }

</script>

</body>
</html>
