<!DOCTYPE html>
<html>
<head>
  <title>LIFORGE</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f1115;
      color: #e6e6e6;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 420px;
      margin-top: 50px;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    .card {
      background: #1a1d24;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
      background: #2a2f3a;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #4f7cff;
      color: white;
      font-weight: bold;
    }

    .score {
      font-size: 40px;
      text-align: center;
      font-weight: bold;
    }

    .streak {
      text-align: center;
      margin-top: 5px;
      opacity: 0.8;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>LIFORGE</h1>

  <div class="card">
    <label>Sleep</label>
    <input id="sleep" type="number">

    <label>Steps</label>
    <input id="steps" type="number">

    <button onclick="saveDay()">Save</button>
  </div>

  <div class="card">
    <div class="score" id="todayScore">--</div>
    <div class="streak" id="streak">Streak: 0</div>
  </div>

  <div class="card" id="history"></div>

</div>

<script>
function getData() {
  return JSON.parse(localStorage.getItem("liforge")) || [];
}

function saveData(data) {
  localStorage.setItem("liforge", JSON.stringify(data));
}

function saveDay() {
  const sleep = Number(document.getElementById("sleep").value);
  const steps = Number(document.getElementById("steps").value);

  const score = Math.round(((Math.min(sleep / 7, 1) + Math.min(steps / 8000, 1)) / 2) * 100);

  document.getElementById("todayScore").innerText = score + "%";
  document.getElementById("todayScore").style.color = getColor(score);

  const today = new Date().toISOString().split("T")[0];

  let data = getData();

  data.unshift({
    date: today,
    sleep,
    steps,
    score
  });

  saveData(data);

  render();
}

function getColor(score) {
  if (score >= 80) return "#4ade80";
  if (score >= 50) return "#facc15";
  return "#f87171";
}

function calcStreak(data) {
  let streak = 0;
  let currentDate = new Date();

  for (let i = 0; i < data.length; i++) {
    const d = new Date(data[i].date);
    const diff = Math.floor((currentDate - d) / (1000 * 60 * 60 * 24));

    if (diff === streak) {
      streak++;
    } else {
      break;
    }
  }

  return streak;
}

function render() {
  const data = getData();

  if (data.length > 0) {
    const latest = data[0];
    const scoreEl = document.getElementById("todayScore");
    scoreEl.innerText = latest.score + "%";
    scoreEl.style.color = getColor(latest.score);
  }

  document.getElementById("history").innerHTML =
    "<b>History</b><br><br>" +
    data.slice(0, 7).map(d =>
      `${d.date} — ${d.score}%`
    ).join("<br>");

  document.getElementById("streak").innerText =
    "Streak: " + calcStreak(data) + " 🔥";
}

render();
</script>

</body>
</html>
