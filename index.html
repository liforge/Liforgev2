<!DOCTYPE html>
<html>
<head>
  <title>LIFORGE</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f1115">

  <style>
*{box-sizing:border-box}
html,body{height:100%;margin:0;font-family:Arial;color:#e6e6e6;overflow-x:hidden}

/* BASE BACKGROUND */
body{
  min-height:100vh;
  background:url("liforge.png") center center/cover no-repeat fixed;
  position:relative;
}

/* DARK OVERLAY (dynamic) */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.25);
  z-index:0;
  transition:.5s ease;
}

.app{
  position:relative;
  z-index:1;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:calc(20px + env(safe-area-inset-top)) 12px env(safe-area-inset-bottom);
}

.container{width:100%;max-width:420px}

.brand{text-align:center;margin-bottom:10px}
.logo{width:90px;display:block;margin:0 auto 8px}
.brand p{margin:0;color:#b9c2d0;font-size:12px}
h1{text-align:center;margin:0}

.card{
  background:rgba(15,16,20,.18);
  backdrop-filter:blur(8px);
  padding:15px;
  margin-top:15px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 6px 20px rgba(0,0,0,.20);
  transition:.4s ease;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0 10px;
  border-radius:8px;
  border:none;
  background:#2a2f3a;
  color:#fff;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#4f7cff;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:hover{background:#3b66ff}

.score{
  font-size:28px;
  text-align:center;
  font-weight:bold;
  margin-top:10px;
  transition:.4s ease;
}

.history-item{
  margin-top:10px;
  padding:10px;
  background:rgba(255,255,255,.06);
  border-radius:10px;
}

#installBtn{
  position:fixed;
  top:12px;
  right:12px;
  padding:10px 12px;
  background:#4f7cff;
  color:#fff;
  border:none;
  border-radius:10px;
  cursor:pointer;
  z-index:999;
  display:none;
}

/* ========================= */
/*        STATES SYSTEM      */
/* ========================= */

/* ENERGY */
body.energy::before{
  background:rgba(0,0,0,.20);
}
body.energy .score{
  text-shadow:0 0 20px rgba(124,247,255,.5);
}
body.energy .card{
  border-color:rgba(124,247,255,.25);
}

/* RECOVERY */
body.recovery::before{
  background:rgba(0,0,0,.45);
}
body.recovery .card{
  filter:saturate(.75);
  opacity:.85;
}
body.recovery .score{
  text-shadow:none;
  opacity:.8;
}

/* FOCUS */
body.focus::before{
  background:rgba(0,0,0,.65);
}
body.focus .card{
  opacity:.6;
  filter:blur(.2px);
}
body.focus .score{
  font-size:34px;
  text-shadow:0 0 30px rgba(255,255,255,.25);
}

  </style>
</head>

<body class="energy">

<!-- STATE SWITCHER (test only) -->
<div style="position:fixed;top:10px;left:10px;z-index:9999;display:flex;gap:6px">
  <button onclick="setState('energy')">Energy</button>
  <button onclick="setState('recovery')">Recovery</button>
  <button onclick="setState('focus')">Focus</button>
</div>

<button id="installBtn">Zainstaluj</button>

<div class="app">
  <div class="container">

    <div class="brand">
      <img src="logo-512.png" class="logo" alt="LIFORGE logo">
      <h1>LIFORGE</h1>
      <p>Forge Yourself</p>
    </div>

    <div class="card">
      <label>Sleep (hours)</label>
      <input id="sleep" type="number">

      <label>Steps</label>
      <input id="steps" type="number">

      <button onclick="save()">Save</button>
    </div>

    <div class="card">
      <div>Today score</div>
      <div class="score" id="score">--</div>
    </div>

    <div class="card">
      <div>History</div>
      <div id="history"></div>
    </div>

  </div>
</div>

<script>

function setState(state){
  document.body.classList.remove("energy","recovery","focus");
  document.body.classList.add(state);
}

/* DATA */
function getData(){return JSON.parse(localStorage.getItem("liforge"))||[];}
function saveData(d){localStorage.setItem("liforge",JSON.stringify(d));}

function save(){
  const sleep=Number(document.getElementById("sleep").value);
  const steps=Number(document.getElementById("steps").value);

  const score=Math.round(((Math.min(sleep/7,1)+Math.min(steps/8000,1))/2)*100);

  document.getElementById("score").innerText=score+"%";

  let data=getData();
  data.unshift({
    date:new Date().toISOString().split("T")[0],
    sleep,steps,score
  });

  saveData(data);
  render();
}

function render(){
  const c=document.getElementById("history");
  c.innerHTML="";
  getData().slice(0,5).forEach(d=>{
    c.innerHTML+=`
      <div class="history-item">
        <b>${d.date}</b><br>
        ${d.sleep}h sleep • ${d.steps} steps • ${d.score}%
      </div>`;
  });
}

render();

/* PWA */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./service-worker.js')
  });
}

/* INSTALL BUTTON */
let deferredPrompt;
const btn=document.getElementById("installBtn");

window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();
  deferredPrompt=e;
  btn.style.display="block";
});

btn.addEventListener("click",async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  const choice=await deferredPrompt.userChoice;
  if(choice.outcome==="accepted")btn.style.display="none";
  deferredPrompt=null;
});

</script>

</body>
</html>
